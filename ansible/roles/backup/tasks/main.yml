---
- name: Validate required variables
  fail:
    msg: "site_name is required"
  when:
    - site_name is not defined or site_name | length == 0

- name: Check if site exists
  stat:
    path: "{{ bench_path }}/sites/{{ site_name }}"
  register: site_check

- name: Fail if site does not exist
  fail:
    msg: "Site {{ site_name }} does not exist"
  when: not site_check.stat.exists

- name: Take Backup
  command:
    cmd: >
      bench --site {{ site_name }} backup --with-files
    chdir: "{{ bench_path }}"
  register: backup_result

- name: Get Latest Database Backup
  shell: |
    ls -t {{ bench_path }}/sites/{{ site_name }}/private/backups/*database.sql.gz | head -1
  register: restore_db_backup
  changed_when: false

- name: Get Latest Public Files Backup
  shell: |
    ls -t {{ bench_path }}/sites/{{ site_name }}/private/backups/*files.tar | grep -v "^.*private-files.tar$" | head -1
  register: restore_public_backup
  changed_when: false

- name: Get Latest Private Files Backup
  shell: |
    ls -t {{ bench_path }}/sites/{{ site_name }}/private/backups/*private-files.tar | head -1
  register: restore_private_backup
  changed_when: false

- name: Display Backup Information
  debug:
    msg:
      - "Database Backup : {{ restore_db_backup.stdout }}"
      - "Public Backup   : {{ restore_public_backup.stdout }}"
      - "Private Backup  : {{ restore_private_backup.stdout }}"

- name: Backup Success
  debug:
    msg: "Backup completed successfully for {{ site_name }}"
