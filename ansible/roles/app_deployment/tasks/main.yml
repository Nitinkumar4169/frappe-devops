---
# ==================================================
# Validate Required Variables
# ==================================================

- name: Validate required variables
  assert:
    that:
      - site_name is defined
      - site_name | length > 0
      - app_name is defined
      - app_name | length > 0
      - repo_url is defined
      - repo_url | length > 0
      - branch is defined
      - branch | length > 0
    fail_msg: >
      site_name, app_name, repo_url and branch are required

# ==================================================
# Verify Site Exists
# ==================================================

- name: Check if site exists
  stat:
    path: "{{ bench_path }}/sites/{{ site_name }}"
  register: site_check

- name: Fail if site does not exist
  fail:
    msg: "Site {{ site_name }} does not exist"
  when: not site_check.stat.exists

# ==================================================
# Check App Exists
# ==================================================

- name: Check if app exists in bench
  stat:
    path: "{{ bench_path }}/apps/{{ app_name }}"
  register: app_check

# ==================================================
# Download App If Missing
# ==================================================

- name: Download app if missing
  command:
    cmd: >
      bench get-app
      --branch {{ branch }}
      {{ app_name }}
      {{ repo_url }}
    chdir: "{{ bench_path }}"
  when: not app_check.stat.exists

- name: Verify app downloaded
  stat:
    path: "{{ bench_path }}/apps/{{ app_name }}"
  register: app_check_after

- name: Fail if app download failed
  fail:
    msg: "Failed to download app {{ app_name }}"
  when: not app_check_after.stat.exists

# ==================================================
# Check Installed Apps
# ==================================================

- name: Get installed apps
  command:
    cmd: bench --site {{ site_name }} list-apps
    chdir: "{{ bench_path }}"
  register: installed_apps

# ==================================================
# Install App If Missing
# ==================================================

- name: Install app if not installed
  command:
    cmd: >
      bench --site {{ site_name }}
      install-app {{ app_name }}
    chdir: "{{ bench_path }}"
  when: app_name not in installed_apps.stdout

# ==================================================
# Backup Site
# ==================================================

- name: Backup site before deployment
  command:
    cmd: >
      bench --site {{ site_name }}
      backup
    chdir: "{{ bench_path }}"
  register: backup_result

- name: Show backup result
  debug:
    var: backup_result.stdout_lines

# ==================================================
# Save Current Commit
# ==================================================

- name: Get current git commit
  command:
    cmd: git rev-parse HEAD
    chdir: "{{ bench_path }}/apps/{{ app_name }}"
  register: current_commit

- name: Display current commit
  debug:
    msg: "Current Commit: {{ current_commit.stdout }}"

# ==================================================
# Deployment Block
# ==================================================

- block:

    # ------------------------------------------
    # Detect Remote
    # ------------------------------------------

    - name: Get git remote
      command:
        cmd: git remote
        chdir: "{{ bench_path }}/apps/{{ app_name }}"
      register: git_remote

    # ------------------------------------------
    # Fetch Latest Code
    # ------------------------------------------

    - name: Fetch latest code
      command:
        cmd: git fetch --all
        chdir: "{{ bench_path }}/apps/{{ app_name }}"

    # ------------------------------------------
    # Checkout Branch
    # ------------------------------------------

    - name: Checkout deployment branch
      command:
        cmd: git checkout {{ branch }}
        chdir: "{{ bench_path }}/apps/{{ app_name }}"

    # ------------------------------------------
    # Sync Branch
    # ------------------------------------------

    - name: Sync branch with remote
      command:
        cmd: >
          git reset --hard
          {{ git_remote.stdout_lines[0] }}/{{ branch }}
        chdir: "{{ bench_path }}/apps/{{ app_name }}"
      register: sync_result

    # ------------------------------------------
    # Get New Commit
    # ------------------------------------------

    - name: Get latest commit
      command:
        cmd: git rev-parse HEAD
        chdir: "{{ bench_path }}/apps/{{ app_name }}"
      register: latest_commit

    - name: Display latest commit
      debug:
        msg: "Latest Commit: {{ latest_commit.stdout }}"

    # ------------------------------------------
    # Build Only If Code Changed
    # ------------------------------------------

    - name: Build assets
      command:
        cmd: timeout 1800 bench build
        chdir: "{{ bench_path }}"
      register: build_result
      when: current_commit.stdout != latest_commit.stdout

    - name: Show build output
      debug:
        var: build_result.stdout_lines
      when:
        - build_result is defined
        - current_commit.stdout != latest_commit.stdout

    # ------------------------------------------
    # Run Migration
    # ------------------------------------------

    - name: Run migration
      command:
        cmd: >
          bench --site {{ site_name }}
          migrate
        chdir: "{{ bench_path }}"
      register: migrate_result

    - name: Show migration output
      debug:
        var: migrate_result.stdout_lines

    # ------------------------------------------
    # Clear Cache
    # ------------------------------------------

    - name: Clear cache
      command:
        cmd: >
          bench --site {{ site_name }}
          clear-cache
        chdir: "{{ bench_path }}"

    - name: Clear website cache
      command:
        cmd: >
          bench --site {{ site_name }}
          clear-website-cache
        chdir: "{{ bench_path }}"

    # ------------------------------------------
    # Restart Bench
    # ------------------------------------------

    - name: Restart bench
      command:
        cmd: bench restart
        chdir: "{{ bench_path }}"
      register: restart_result
      async: 300
      poll: 10

    - name: Show restart output
      debug:
        var: restart_result.stdout_lines

  rescue:

    # ------------------------------------------
    # Rollback
    # ------------------------------------------

    - name: Rollback to previous commit
      command:
        cmd: git reset --hard {{ current_commit.stdout }}
        chdir: "{{ bench_path }}/apps/{{ app_name }}"
      register: rollback_result

    - name: Show rollback output
      debug:
        var: rollback_result.stdout_lines

    - name: Fail deployment
      fail:
        msg:
          - "Deployment failed"
          - "Rollback completed"
          - "Database backup available"

# ==================================================
# Health Check
# ==================================================

- name: Check scheduler status
  command:
    cmd: >
      bench --site {{ site_name }}
      scheduler status
    chdir: "{{ bench_path }}"
  register: scheduler_result

- name: Show scheduler status
  debug:
    var: scheduler_result.stdout_lines

- name: Run bench doctor
  command:
    cmd: bench doctor
    chdir: "{{ bench_path }}"
  register: doctor_result

- name: Show doctor output
  debug:
    var: doctor_result.stdout_lines

# ==================================================
# Success Message
# ==================================================

- name: Deployment success
  debug:
    msg:
      - "=================================="
      - "DEPLOYMENT SUCCESSFUL"
      - "Site   : {{ site_name }}"
      - "App    : {{ app_name }}"
      - "Branch : {{ branch }}"
      - "=================================="
