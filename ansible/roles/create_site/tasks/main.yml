---
- name: Check if site exists
  stat:
    path: "{{ bench_path }}/sites/{{ site_name }}"
  register: site_check

- name: Create Frappe Site
  command:
    cmd: >
      bench new-site {{ site_name }}
      --admin-password admin
      --mariadb-root-password {{ mariadb_root_password }}
    chdir: "{{ bench_path }}"
  when: not site_check.stat.exists

- name: Setting up nginx
  command:
    cmd: >
      bench setup nginx --yes
    chdir: "{{ bench_path }}"
  when: not site_check.stat.exists
  
- name: Reload Nginx
  command: sudo -n /usr/bin/systemctl reload nginx
  register: reload_result
  changed_when: reload_result.rc == 0
  
- name: Success Message
  debug:
    msg:
      - "Site created successfully"
      - "Site Name : {{ site_name }}"
