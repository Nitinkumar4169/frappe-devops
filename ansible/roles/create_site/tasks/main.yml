---
- name: Check if site exists
  stat:
    path: "/home/frappe-user/frappe-bench/sites/{{ site_name }}"
  register: site_check

- name: Create Frappe Site
  command:
    cmd: >
      bench new-site {{ site_name }}
      --admin-password admin
      --mariadb-root-password {{ mariadb_root_password }}
    chdir: /home/frappe-user/frappe-bench
  when: not site_check.stat.exists
