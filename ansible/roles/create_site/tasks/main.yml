---
- name: Check if site exists
  stat:
    path: "{{ bench_path }}/sites/{{ site_name }}"
  register: site_check

- name: Create Frappe Site
  command:
    cmd: >
      bench new-site {{ site_name }}
      --admin-password admin
      --mariadb-root-password {{ mariadb_root_password }}
    chdir: "{{ bench_path }}"
  when: not site_check.stat.exists

- name: Setting up nginx
  command:
    cmd: >
      bench setup nginx
    chdir: "{{ bench_path }}"
  register: nginx_setup

- debug:
    var: nginx_setup.delta

- name: Reload Nginx
  become: yes
  service:
    name: nginx
    state: reloaded
  when: not site_check.stat.exists
